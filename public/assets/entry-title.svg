<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 430" role="img" aria-labelledby="title desc">
  <title id="title">欢迎来到 Bobby's World</title>
  <desc id="desc">A crisp gold and ivory title mark for Bobby's World.</desc>
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff3bf"/>
      <stop offset="0.35" stop-color="#d8a749"/>
      <stop offset="0.72" stop-color="#91601e"/>
      <stop offset="1" stop-color="#f4d27a"/>
    </linearGradient>
    <filter id="ink-shadow" x="-12%" y="-20%" width="124%" height="150%">
      <feTurbulence baseFrequency="0.018 0.11" numOctaves="2" seed="17" result="grain"/>
      <feDisplacementMap in="SourceGraphic" in2="grain" scale="2.2" xChannelSelector="R" yChannelSelector="G" result="rough"/>
      <feDropShadow dx="0" dy="10" stdDeviation="7" flood-color="#070402" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#e7b95c" flood-opacity="0.28"/>
    </filter>
    <filter id="line-rough" x="-4%" y="-40%" width="108%" height="180%">
      <feTurbulence baseFrequency="0.04 0.18" numOctaves="2" seed="9" result="grain"/>
      <feDisplacementMap in="SourceGraphic" in2="grain" scale="1.4"/>
    </filter>
  </defs>

  <g filter="url(#line-rough)" opacity="0.96">
    <path d="M392 92 C475 84 548 84 632 92" fill="none" stroke="#f5eedb" stroke-width="8" stroke-linecap="round"/>
    <path d="M407 101 C481 94 541 95 617 101" fill="none" stroke="#a87525" stroke-width="5" stroke-linecap="round"/>
    <circle cx="652" cy="94" r="13" fill="#d6a448" stroke="#f6edd4" stroke-width="6"/>
    <path d="M968 92 C1054 84 1128 84 1211 92" fill="none" stroke="#f5eedb" stroke-width="8" stroke-linecap="round"/>
    <path d="M983 101 C1058 94 1120 95 1196 101" fill="none" stroke="#a87525" stroke-width="5" stroke-linecap="round"/>
    <circle cx="948" cy="94" r="13" fill="#d6a448" stroke="#f6edd4" stroke-width="6"/>
  </g>

  <g filter="url(#ink-shadow)" text-anchor="middle">
    <text
      x="800"
      y="115"
      fill="url(#gold)"
      stroke="#fbf5e7"
      stroke-width="7"
      paint-order="stroke fill"
      font-family="'Noto Serif SC', 'STSong', 'SimSun', serif"
      font-size="64"
      font-weight="700"
      letter-spacing="18">欢迎来到</text>
    <text
      x="800"
      y="300"
      fill="url(#gold)"
      stroke="#fbf5e7"
      stroke-width="9"
      paint-order="stroke fill"
      font-family="'IM Fell English', 'Georgia', serif"
      font-size="178"
      font-style="italic"
      letter-spacing="4">Bobby's World</text>
  </g>

  <path d="M405 333 C575 373 754 376 948 336 C1039 318 1124 304 1230 314" fill="none" stroke="#f4ead0" stroke-width="7" stroke-linecap="round" opacity="0.85" filter="url(#line-rough)"/>
  <path d="M421 344 C594 380 766 380 940 344 C1042 323 1129 315 1211 324" fill="none" stroke="#9a6724" stroke-width="4" stroke-linecap="round" opacity="0.74" filter="url(#line-rough)"/>
</svg>
