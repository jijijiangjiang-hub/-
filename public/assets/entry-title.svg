<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 260" role="img" aria-labelledby="title desc">
  <title id="title">Welcome to Bobby's World</title>
  <desc id="desc">A minimal gold cursive title line.</desc>
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8df" stop-opacity="0.92"/>
      <stop offset="0.5" stop-color="#d8c893" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#f0dfad" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="soft-glow" x="-8%" y="-30%" width="116%" height="170%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#120d09" flood-opacity="0.34"/>
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#f0dfad" flood-opacity="0.16"/>
    </filter>
  </defs>
  <text
    x="800"
    y="145"
    fill="url(#gold)"
    filter="url(#soft-glow)"
    text-anchor="middle"
    font-family="'Snell Roundhand', 'Bickham Script Pro', 'Brush Script MT', 'IM Fell English', 'Georgia', serif"
    font-size="118"
    font-style="italic"
    font-weight="400"
    letter-spacing="0.6">Welcome to Bobby's World</text>
  <path
    d="M404 180 C565 194 706 196 800 184 C894 172 1033 169 1196 181"
    fill="none"
    stroke="url(#gold)"
    stroke-width="2.2"
    stroke-linecap="round"
    opacity="0.44"/>
</svg>
