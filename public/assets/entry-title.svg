<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 260" role="img" aria-labelledby="title desc">
  <title id="title">Welcome to Bobby's World</title>
  <desc id="desc">A minimal gold cursive title line.</desc>
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8df96"/>
      <stop offset="0.55" stop-color="#c89431"/>
      <stop offset="1" stop-color="#f1cf78"/>
    </linearGradient>
    <filter id="soft-glow" x="-8%" y="-30%" width="116%" height="170%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1a0f05" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#e7bd5a" flood-opacity="0.22"/>
    </filter>
  </defs>
  <text
    x="800"
    y="145"
    fill="url(#gold)"
    filter="url(#soft-glow)"
    text-anchor="middle"
    font-family="'IM Fell English', 'Georgia', 'Times New Roman', serif"
    font-size="108"
    font-style="italic"
    font-weight="400"
    letter-spacing="1.5">Welcome to Bobby's World</text>
  <path
    d="M404 180 C565 194 706 196 800 184 C894 172 1033 169 1196 181"
    fill="none"
    stroke="url(#gold)"
    stroke-width="3"
    stroke-linecap="round"
    opacity="0.68"/>
</svg>
